<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bilal Loader</title>

<script>

var url = "index.html?v=" + Date.now();

fetch(url,{cache:"no-store"})
.then(function(){

    window.location.href = url;

})
.catch(function(){

    console.log("Offline → loading cached version");

    window.location.href = "index.html";

});

</script>

</head>

<body style="background:black;color:white;font-family:Arial;text-align:center;margin-top:20%">

Loading BilalApp...

</body>
</html>
