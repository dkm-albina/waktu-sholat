<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <title>Jadwal Shalat</title>
    <link rel="stylesheet" href="www/public/Bilal/css/normalize.min.css" />
    <link rel="stylesheet" href="www/public/Bilal/js/owlcarousel/assets/owl.carousel.min.css" />
    <link rel="stylesheet" href="www/public/Bilal/js/owlcarousel/assets/owl.theme.default.min.css" />
    <link rel="icon" href="data:,">
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body,
        body * {
            font-family: Arial, Helvetica, sans-serif !important;
        }

        body {
            /*-webkit-font-smoothing: antialiased;*/
            /*-moz-osx-font-smoothing: grayscale;*/
            text-rendering: optimizeLegibility;
            font-weight: bolder;
            font-synthesis: style;
            font-synthesis-weight: auto;
            overflow: hidden;
            /* cegah scroll bar muncul */
        }

        .row {
            box-sizing: border-box;
        }

        .col {
            /*mengatur letak nama masjid dll (yg ada di header)*/
            float: left;
            box-sizing: border-box;
        }

        .col4 {
            /* menjelang*/
            width: 27%;
            /*color:#8d6e63;  kalau mau diganti coklat medium */
            color: #ffe082;
            /* diganti emas muda */
            font-size: 14px;
            margin-bottom:3px;
        }

        .first .mybox {
            /*panel waktu 4*/
            background-color: #4e342e;
            /* coklat tua */
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;

            /*box-shadow:0 2px 8px rgba(0,0,0,0.35);*/
            box-shadow:
                0 2px 8px rgba(0, 0, 0, 0.35),
                0 0 6px rgba(33, 147, 176, 0.35);
        }

        .col2 {
            width: 46%;
        }

        .col7 {
            /*jadwal dan nama sholat*/
            float: left;
            margin-top: -6px;
            /*naikkan sedikit agar lebih rapat*/
            width: 12.2857%;
            margin-left: 1%;
            margin-right: 1%;
        }

        .p-0 {
            padding: 0;
        }

        .mycontainer {
            width: 100%;
            height: 100vh;
            padding: 1vh 1.05vw;
            box-sizing: border-box;
        }

        .first {
            /*header*/
            background-color: #2e7d32;
            /* hijau tua */
            padding: 5px 16px;
            margin-top: 5px;
            
            height: 96px;
            /*awalnya 100px, dikurangi agar lebih proporsional*/

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
        }

        .first .middle1 {
            /*nama masjid*/
            margin-top: 0px;
            /*turun atau naikkan sedikit agar lebih rapat*/
            /*color:#F5EC6D; kuning muda */
            color: #F5F5F5;
            /* putih terang, agar lebih kontras dengan latar belakang hijau tua */
            font-size: 45px;
            /*40px*/
            font-weight: bolder;
            font-weight: 900;
            text-shadow:
                0 2px 5px rgba(0, 0, 0, 0.7),
                0 0 8px rgba(197, 225, 165, 0.6);
        }

        .first .middle2 {
            /*alamat masjid*/
            color: #c5e1a5;
            /* hijau muda */
            font-size: 23px;
            font-weight: bold;
            text-shadow:
                0 1px 0 #1b5e20,
                0 2px 2px rgba(0, 0, 0, 0.5);
            margin-top: -4px;
            /*naikkan sedikit agar lebih rapat dengan nama masjid*/
        }

        .first .middle3 {
            /*longitudinal masjid*/
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            margin-top: -1px;
        }

        .second {
            /*bawah header box nama sholat n jam sholat*/
            box-sizing: border-box;
            padding: 6px 10px 1px 10px;
            margin-bottom: 20px;
            height: 56px;
            border-bottom: 1px solid transparent;
        }

        .third {
            /*slide*/
            padding: 0 16px;
            /*20px*/
        }

        .four {
            /*slide bawah foot*/
            height: 8px;
            /*awalnya 12px*/
        }

        .four .footer1 {
            /*versi*/
            /*color:#000000;*/
            color: #2E7D32;
            /* hijau muda */
            float: left;
            font-size: 8px;
            /*10px*/
            margin-left: 16px;
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.7);
               // 0 0 2px rgba(255, 200, 120, 0.6);
        }

        .four .footer2 {
            /*bilal app*/
            /*color:#000000;*/
            color: #2E7D32;
            /* hijau muda */
            float: right;
            font-size: 8px;
            /*10px*/
            margin-right: 16px;
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.7);
             //   0 0 2px rgba(255, 200, 120, 0.6);
        }

        .first,
        .second,
        .third {
            transform: translateZ(0);
        }

        .myprayer {
            /*jadwal*/
            color: #fff;
            float: left;
            font-weight: bold;
        }

        .masehi {
            /*jam skrg */
            font-size: 56px;
            /*dari 50px */
            font-weight: bold;
            margin: 0 auto 5px auto;
            padding: 0px 0px;
            text-transform: uppercase;
            /*color:#66ffff;*/
            color: #ffcc80;
            /* coklat keemasan */

            /* text-shadow:0 0 8px rgba(255,204,128,0.6); */
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.7),
                0 0 6px rgba(255, 200, 120, 0.6);
        
        .hijriah {
            /*hari skrg*/
            padding: 5px 0px;
            font-weight: bold;
            color: #d7ccc8;
            /* coklat muda */
            font-size: 12px;
            /*dari 14px */
            line-height: 1.1;

        }

        .countdown-event {
            /*margin countdown*/
            margin-bottom: 2px;
        }

        .countdown-event {
            /*waktu mundur*/
            margin: 3px auto 5px auto;
            padding: 0px 0px;
            font-size: 56px;
            /*60px*/
            font-weight: bold;
            /*color:#ccff00;*/
            color: #aed581;
            /* hijau muda */

            /*text-shadow:0 2px 4px rgba(0,0,0,0.6);*/
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.7),
                0 0 4px #66ffff;
            /* 0 0 6px rgba(255,215,100,0.6); bisa nambah berat di TV Box*/
        }

        .masehi:empty::after {
            content: "00:00:00";
            opacity: 0.3;
        }

        .masehi,
        .countdown-event {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            letter-spacing: 1px;
            line-height: 1;
            margin-bottom: 3px;
            font-weight: 700;
        }

        .prayer-title {
            /*judul sholat*/
            font-size: 20px;
            padding: 0px;
            text-align: center;
            background-color: #5d4037;
            /* coklat tua */
            margin-bottom: 1px;
            border-radius: 4px;
            font-weight: bold;

            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .wallpaper::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.18);
            /* overlay gelap untuk meningkatkan kontras teks */
            pointer-events: none;
        }

        .super-block {
            /*background*/
            /*background-color:#178B9A;*/
            background-image: linear-gradient(180deg,
                    #2e7d32 0%,
                    #2f7a30 12%,
                    #34752e 28%,
                    #3b6b2d 45%,
                    #3f5e2d 65%,
                    #444a2e 82%,
                    #4e342e 100%);
        }

        .prayer-time {
            /*waktu sholat*/
            font-size: 44px;
            padding: 0px;
            text-align: center;
            /*background-color: #1E5F95;*/
            background-color: #6d4c41;
            /* coklat medium */
            border-radius: 4px;
            font-weight: bold;

            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
        }

        .clear {
            clear: both;
        }

        .text-center {
            text-align: center;
        }

        .wallpaper-container {
            position: relative;
        }


        .slide-container {
            min-height: calc(100vh - 186px);
        }


        .wallpaper {
            position: relative;
            min-height: calc(100vh - 186px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wallpaper.ready {
            opacity: 1;
        }

        .wallpaper .item {
            /*wallpaper slide*/
            box-sizing: border-box;
            will-change: transform;
            /*perhalus render transisi image*/
            width: 100%;
            /*background-image: url("img/img1.jpg");*/
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            /*background-color: #124653;*/
            background-color: #2e7d32;
            /* hijau tua */
            height: calc(100vh - 186px);
            /*100vh - 196px*/
            border: 2px solid #4e342e;
            /* coklat tua */
            border-radius: 1px;
            /*awalnya 4px*/
            -webkit-transition: all .2s ease-in-out;
            -o-transition: all .2s ease-in-out;
            transition: all .2s ease-in-out;

            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);

        }

        .second-block {
            margin: 0px auto;
        }

        .running-container {
            /* contain text */
            position: absolute;
            bottom: 15px;
            /* jarak dari bawah layar */
            left: 1%;
            /* sebelumnya 2% */
            width: 98%;
            /* sebelumnya 98% */
            z-index: 99999999;
        }

        .running-text .js-marquee {
            /* Kosong, tapi tetap disiapkan untuk JS */
        }

        .running-text {
            /* teks berjalan */
            padding: 2px;
            /* sebelumnya 2px */
            overflow: hidden;

            /* background */
            /* sebelumnya: #2c0f0082; */
            background: rgba(78, 52, 46, 0.7);
            /* coklat semi transparan */

            /* color */
            /* sebelumnya: #F5EC6D; */
            color: #c5e1a5;
            /* hijau muda, sesuai tema */

            /* text-shadow:*/
            /* 0 1px 2px rgba(0,0,0,0.8),*/
            /* 0 0 2px #2193b0; pakai ini di Android 6 TV Box bergetar textnya */

            /* text-shadow: 0 1px 1px rgba(0,0,0,0.5); shadow halus untuk meningkatkan keterbacaan tanpa membuat teks terlalu berkilau */

            font-size: 27px;
            /* sebelumnya 27px */
            white-space: nowrap;
            /* tetap satu baris */
            box-sizing: border-box;
            /* padding dihitung dalam lebar */
        }


        .highlight {
            color: #ffe082 !important;
            /* #ffd54f coklat keemasan, ganti light gold */

            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.7),
                0 0 8px rgba(255, 224, 130, 0.9);

            font-weight: bold;

        }

        .prayer-time.IMSAK {
            opacity: 0.60;
        }

        .prayer-time.SYURUQ {
            opacity: 0.75;
        }

        .desc-container {
            /*pad menjelang*/
            padding: 4px 0;
            color: #ffd54f;

            text-shadow:
                0 1px 2px rgba(0, 0, 0, 0.7),
                0 0 4px rgba(215, 204, 200, 0.5);
        }

        .layer {
            width: 100%;
            height: 100vh;
            background-color: #000;
            position: fixed;
            left: 0;
            top: 0;
            display: none;
            color: #fff;
            font-size: 20px;
            /*20px*/
            z-index: 10000;
        }

        .net-online {
            color: #c5e1a5;
            font-weight: bold;
        }

        .net-offline {
            color: #ff5252;
            font-weight: bold;
            animation: blinkOffline 1.5s infinite;
        }

        .message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /*height:calc(100vh - 196px);*/
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            /* backdrop-filter: blur(3px); */
            /* efek blur untuk latar belakang, bisa dicoba jika performa perangkat cukup baik */
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 9999;
        }

        .message-box {
            color: #fff;
            font-weight: bold;
            /* alternatif posisi untuk lebih ke atas:
            transform: translateY(-80px);
            */
            margin-top: -80px;
            /*lebih stabil ini untuk tv box*/
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.9);
            /* 0 4px 10px rgba(0,0,0,0.7), */
            /* 0 0 8px rgba(0,0,0,0.6); */
        }

        .msg1,
        .msg2,
        .msg3 {
            color: #ffffff;
            letter-spacing: 2px;
            line-height: 1.2;

            text-shadow:
                0 3px 6px rgba(0, 0, 0, 0.9),
                /* 0 6px 18px rgba(0,0,0,0.7), */
                0 0 10px rgba(33, 147, 176, 0.6);
        }

        .msg1 {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .msg2 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .msg3 {
            font-size: 50px;
        }

        @keyframes blinkOffline {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.25;
            }

            100% {
                opacity: 1;
            }
        }

        .owl-carousel .animated {
            animation-duration: 1.5s !important;
            animation-fill-mode: both;
        }

        .owl-carousel .fadeOut {
            animation-name: fadeOut;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .owl-carousel .fadeIn {
            animation-name: fadeIn;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>

</head>

<body>

    <div class="layer"></div>

    <!--fix problem : google chrome update will not autoplay audio/video-->
    <iframe src="www/public/Bilal/audio/silence.mp3" allow="autoplay" id="audio" style="display:none"></iframe>

    <script src="www/public/Bilal/js/jquery-3.3.1.min.js"></script>
    <script src="www/public/Bilal/js/moment-with-locales.min.js"></script>
    <script src="www/public/Bilal/js/moment-hijri.js"></script>

    <script src="www/public/Bilal/js/PrayTimes.js"></script>
    <script src="www/public/Bilal/js/jquery.marquee.min.js"></script>
    <script src="www/public/Bilal/js/owlcarousel/owl.carousel.min.js"></script>

    <script>

        //app setting
        var app = {
            version: '1.2.9', // FIX BUG + auto refresh daily + stability fix + owl fix + normalize heartbeat (19/03/2026) by Andryan Nugraha
            name: 'Bilal App',
            autoLocation: false // SET true, jika anda ingin menggunakan autolocation, setelah memilih opsi enable GPS pada browser, lalukan refresh pada browser. Fitur ini hanya berfungsi jika device terkoneksi dengan internet saja.
        };

        //general setting
        var setting = {
            nama: 'MASJID AL - BINA',
            alamat: 'Casablanca East Residences',

            //settingan latitude longitude altitude timezone jika app.autoLocation=false atau jika browser tidak support HTML5 Geolocation
            latitude: -6.223723,
            longitude: 106.897179,
            altitude: 100,
            timezoneOffset: 7,

            methodCalc: 'Kemenag', //metode perhitungan adzan
            dst: 'auto',

            tune: { imsak: +3, fajr: +3, sunrise: +6, dhuhr: +3, asr: +3, sunset: +3, maghrib: +3, isha: +1, midnight: +3 },

            runningTextFile: "www/public/Bilal/text/runningtext.txt",
            runningTextSpeed: 15000,

            slideInterval: 19000,
            slideImageCount: 21,

            adzanTime: 270000, // 4 menit 30 detik lama tulisan adzan
            iqomahTime: 30000, // 30 detik lama waktu tulisan iqomah
            shalatSunnahTime: 600000, //10 menit lama waktu tulisan sholat sunnah
            shalatSunnahTimeSubuh: 900000, // 15 menit lama waktu sholat sunnah subuh

            shalatDuration: {
                SUBUH: 600000, // 10 menit lama untuk shalat subuh, karena biasanya lebih panjang dari shalat lain, terutama jika ada shalat sunnah subuh
                ZHUHUR: 540000,
                ASHAR: 540000,
                MAGHRIB: 540000,
                ISYA: 600000 // 10 menit lama untuk shalat isya, karena biasanya lebih panjang dari shalat lain, terutama jika ada shalat tarawih
            }, //9 menit lama untuk Shalat

            aliasName: ['IMSAK', 'SUBUH', 'SYURUQ', 'ZHUHUR', 'ASHAR', 'MAGHRIB', 'ISYA']
        }

        // FIX BUG global variable
        var mycountdown;
        var finalTime;
        var masterTime;
        var masterName;
        var tempShalat;
        var systemState = "countdown";
        var systemPrayer = "";
        var shalatTimer = null;
        var watchdogLastTick = Date.now();
        var internetFailCount = 0;
        var internetFailTolerance = 10; // toleransi gagal cek internet sebelum dianggap offline (default 10 kali)
        var bilalLogger = null;
        var bilalLoggerStopper = null;
        var iqomahCountdownActive = false;
        var iqomahLastSecond = -1;
        var owlRunning = false;
        var owlReady = false;
        var owlResetTimer = null;
        var heartbeatInterval = null;
        var heartbeatTick = 0;
        var currentDate;
        var todayDate;
        var lastStabilityCheck = Date.now();
        var lastMinuteCheck = Date.now();
        var lastWatchdogCheck = Date.now();
        var appStarted = false;
        var HIJRI_OFFSET = -1;


        // FIX STABILITY TV BOX MODE
        // tidak reload halaman karena bisa gagal jika internet mati
        // hanya refresh jadwal dan countdown
        // =============================
        // HEARTBEAT 1 MENIT TASK (Midnight + Daily Refresh Safe)
        // =============================
        var lastMinuteCheck = Date.now();
        var todayDate = moment().format("YYYY-MM-DD");
        var lastMidnightTrigger = null; // flag tambahan untuk midnight

        function heartbeatOneMinuteTask() {

            var now = Date.now();

            // hanya eksekusi jika sudah > 60 detik sejak terakhir
            if (now - lastMinuteCheck < 60000) return;

            lastMinuteCheck = now;

            var nowMoment = moment();
            var currentDateStr = nowMoment.format("YYYY-MM-DD");

            var shouldRefresh = false;

            // =========================
            // 1. Daily refresh: cek pergantian hari
            // =========================
            if (currentDateStr !== todayDate && systemState === "countdown") {
                todayDate = currentDateStr;
                shouldRefresh = true;
                console.log("Daily refresh triggered:", currentDateStr);
            }

            // =========================
            // 2. Midnight refresh: cek jam 00:00
            // - Gunakan lastMidnightTrigger agar tidak ganda
            // =========================
            if (
                nowMoment.hour() === 0 &&
                nowMoment.minute() === 0 &&
                lastMidnightTrigger !== currentDateStr
            ) {
                shouldRefresh = true;
                lastMidnightTrigger = currentDateStr;
                console.log("Midnight refresh triggered:", currentDateStr);
            }

            // =========================
            // 3. Jalankan startApp sekali jika ada trigger aktif
            // =========================
            if (shouldRefresh) {
                startApp(true); // force restart
            }

            // =========================
            // 4. Cek status jaringan
            // =========================
            updateNetworkStatus();

            // =========================
            // Opsional: log ringan untuk debugging
            // =========================
            if (Math.random() < 0.1) {
                console.log("Heartbeat 1-min tick:", nowMoment.format("HH:mm:ss"));
            }
        }

        // =============================
        // INTEGRASI DENGAN HEARTBEAT INTERVAL UTAMA
        // =============================
        function startHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);

            heartbeatInterval = setInterval(function () {

                // 1. BASIC TICK SETIAP DETIK
                if (systemState === "countdown") {
                    watchdogLastTick = Date.now();
                }
                updateClockDisplay();

                // 2. HEARTBEAT 1 MENIT TASK
                heartbeatOneMinuteTask();

                // 3. WATCHDOG 5 MENIT
                if (Date.now() - lastWatchdogCheck > 300000) {
                    lastWatchdogCheck = Date.now();
                    if (Date.now() - watchdogLastTick > 150000 && systemState === "countdown") {
                        console.log("Watchdog restart (heartbeat)");
                        try { startApp(true); } catch (e) { console.log("Watchdog error:", e); }
                    }
                }

                // 4. STABILITY REFRESH 6 JAM
                if (Date.now() - lastStabilityCheck > 21600000) {
                    lastStabilityCheck = Date.now();
                    console.log("Stability refresh (heartbeat)");
                    if (systemState == "countdown") startApp(true);
                }

            }, 1000);
        }

        // BilalApp Logger
        function startLogger() {

            // cegah logger ganda
            if (bilalLogger) clearInterval(bilalLogger);
            if (bilalLoggerStopper) clearTimeout(bilalLoggerStopper);

            console.log("Bilal App started at", moment().format("YYYY-MM-DD HH:mm:ss"));

            bilalLogger = setInterval(function () {

                console.log(
                    "Bilal Status |",
                    "Time:", moment().format("HH:mm:ss"),
                    "| State:", systemState,
                    "| Prayer:", systemPrayer,
                    "| Internet:", navigator.onLine
                );

            }, 60000);

            // stop setelah 5 menit
            bilalLoggerStopper = setTimeout(function () {

                clearInterval(bilalLogger);
                bilalLogger = null;

                console.log("Bilal Logger stopped after 5 minutes");

            }, 300000);

        }

        // with FIX BUG geolocation async
        function startApp(force = false) {

            if (appStarted && !force) {
                console.log("startApp skipped (already started)");
                return;
            }


            if (force) {
                console.log("Force restart app");

                systemState = "countdown";
                systemPrayer = "";
            }

            appStarted = true;

            stopTimer(); // FIX edge case midnight timer

            var offsetIcon = setting.timezoneOffset > 0 ? '+' : (setting.timezoneOffset == 0) ? '' : '-';
            var now = new Date(); // today

            // watchdogLastTick = Date.now(); // Sengaja dihapus saja agar tidak mengganggu proses loading jadwal, karena jika loading jadwal lama (misal karena metode perhitungan yang kompleks), maka bisa menyebabkan watchdog restart yang tidak perlu

            prayTimes.setMethod(setting.methodCalc);
            prayTimes.tune(setting.tune);

            var times = prayTimes.getTimes(now, [setting.latitude, setting.longitude], setting.timezoneOffset, setting.dst);

            masterTime = [times.imsak, times.fajr, times.sunrise, times.dhuhr, times.asr, times.maghrib, times.isha];
            masterName = setting.aliasName;

            masterSchedule = masterTime.map(function (t, i) {
                var splt = t.split(':');

                return {
                    name: masterName[i],
                    timeStr: t,
                    timestamp: moment().hour(splt[0]).minute(splt[1]).second(0).unix()
                };
            });

            masterSchedule.sort(function (a, b) {
                return a.timestamp - b.timestamp;
            });

            // FIX BUG reference array (harus copy bukan reference)
            tempShalat = masterTime.slice();

            $('.IMSAK').text(times.imsak);
            $('.SUBUH').text(times.fajr);
            $('.SYURUQ').text(times.sunrise);
            $('.ZHUHUR').text(times.dhuhr);
            $('.ASHAR').text(times.asr);
            $('.MAGHRIB').text(times.maghrib);
            $('.ISYA').text(times.isha);

            $('.tz-offset').text(offsetIcon + setting.timezoneOffset);
            $('.latitude').text(parseFloat(setting.latitude).toFixed(4));
            $('.longitude').text(parseFloat(setting.longitude).toFixed(4));
            $('.altitude').text(setting.altitude);
            $('.middle1').text(setting.nama);
            $('.middle2').text(setting.alamat);
            $('.version').text(app.version);
            $('.appname').text(app.name);

            safeResetOwl(); // ← khusus owl, agar tidak error jika jadwal berubah saat slide show berjalan

            nextSchedule();
        }



        // FIX BUG audio autoplay
        function beep() {
            if ($('#player')[0]) {
                $('#player')[0].play().catch(() => { });
            }
        }

        // FIX BUG inArray
        function inArray(needle, haystack) {
            for (var i = 0; i < haystack.length; i++) {
                if (haystack[i] == needle) return true;
            }
            return false;
        }

        $(function () {

            moment.locale('id');
            // FIX FEATURE auto refresh daily tracking
            todayDate = moment().format("YYYY-MM-DD");

            updateClockDisplay(); // 🔥 langsung tampil
            startHeartbeat(); // mulai heartbeat BilalApp untuk stabilitas TV Box mode
            startLogger(); // mulai BilalApp logger untuk 5 menit di awal saja

            // Karena ada fungsistartApp(); // 🔥 maka geolocation async, jangan tunggu di bawah
            // FIX BUG geolocation async
            if (app.autoLocation && "geolocation" in navigator) {

                navigator.geolocation.getCurrentPosition(function (position) {

                    setting.latitude = position.coords.latitude;
                    setting.longitude = position.coords.longitude;

                    // FIX BUG altitude undefined pada beberapa browser
                    if (position.coords.altitude !== null && position.coords.altitude !== undefined) {
                        setting.altitude = position.coords.altitude;
                    }

                    // FIX BUG timezone
                    setting.timezoneOffset = Math.round(moment().utcOffset() / 60);

                    startApp(true);

                },
                    function error() {
                        startApp(true); // fallback jika GPS gagal
                    },
                    { maximumAge: 10000, timeout: 3000, enableHighAccuracy: true });

            } else {

                startApp(true); // langsung mulai tanpa geolocation

            }

            // cek saat pertama load
            updateNetworkStatus();

            // pastikan update lagi setelah DOM stabil
            setTimeout(updateNetworkStatus, 600);

            // cek jika status berubah
            window.addEventListener('online', updateNetworkStatus);
            window.addEventListener('offline', updateNetworkStatus);


            //running text
            $.ajax({
                url: setting.runningTextFile,
                timeout: 3000,
                success: function (d) {
                    $('.running-text').text(d);
                },
                error: function () {
                    $('.running-text').text("Selamat datang di " + setting.nama);
                },
                complete: function () {
                    if ($('.running-text').data('marquee')) {
                        $('.running-text').marquee('destroy');
                    } // jika ada instance marquee sebelumnya, hancurkan dulu agar tidak duplikat
                    $('.running-text').marquee({
                        duration: setting.runningTextSpeed,
                        gap: 50
                    });
                }

            });

            //CHECK Visibility
            document.addEventListener("visibilitychange", function () {

                if (document.visibilityState === "visible") {
                    watchdogLastTick = Date.now();
                }

            });



            //slide wallpaper
            for (var a = 1; a <= setting.slideImageCount; a++) { // FIX BUG global variable
                $('.slide-container').append('<div class="item" style="background-image: url(\'www/public/Bilal/img/slide/' + a + '.JPG\')"></div>');
            }

            requestAnimationFrame(function () {
                var $owl = $('.owl-carousel');

                if ($owl.data('owl.carousel')) {
                    $owl.owlCarousel('destroy');
                }

                var speed = 1500;
                var interval = setting.slideInterval;

                if (interval <= speed) {
                    interval = speed + 1000; // lebih lega kalau user swipe
                }

                $owl.owlCarousel({
                    items: 1,
                    loop: true,
                    dots: false,

                    autoplay: true,
                    autoplayHoverPause: false,
                    autoplayTimeout: interval,

                    // 🔥 Swipe aktif
                    touchDrag: true,
                    mouseDrag: false,

                    // 🔥 Fade
                    animateOut: 'fadeOut',
                    animateIn: 'fadeIn',
                    smartSpeed: speed
                });

                //INIT OWL CAROUSEL SETTING 
                window.owlReady = true;
                window.owlRunning = true;

                // 🔥 tampilkan setelah siap
                $('.wallpaper').addClass('ready');
            });
        });

            //stop timer
            function stopTimer() {
                if (mycountdown) {
                    clearInterval(mycountdown);
                    mycountdown = null;
                }

                if (shalatTimer) {
                    clearTimeout(shalatTimer);
                    shalatTimer = null;
                }
            }

            // =========================
            // UPDATE CLOCK DISPLAY
            // agar kode jam tidak duplikat
            // =========================
            function updateClockDisplay() {

                var nowMoment = moment();

                $('.masehi').text(nowMoment.format('HH:mm:ss'));

                $('.hijriah').text(
                    nowMoment.format('ddd, DD/MM/YYYY') +
                    ' - ' +
                    nowMoment.clone().add(HIJRI_OFFSET, 'iDate').format('iD iMMMM iYYYY [H]')
                );

            }

            function countdownShalat(time, name, desc, shalatName = '') {

                stopTimer(); // FIX BUG memory leak, pastikan semua timer bersih
                systemState = name;
                systemPrayer = shalatName;

                $('.myprayer').removeClass('highlight');

                // FIX BUG highlight event adzan/iqomah
                var highlightName = shalatName ? shalatName : name;
                $('.' + highlightName).closest('.myprayer').addClass('highlight');

                $('.desc').text(desc);

                finalTime = time;

                mycountdown = setInterval(function () {


                    // =========================
                    // OPTIMASI MOMENT
                    // =========================
                    // var now = moment().unix(); berat di Android 6.0 TV Box, ganti dengan Date.now() yang lebih ringan, karena kita hanya butuh detik saja
                    var now = Math.floor(Date.now() / 1000);

                    var distance = finalTime - now;

                    // ========================================
                    // COUNTDOWN IQOMAH 60 DETIK TERAKHIR
                    // ========================================
                    if (name == 'shalat_sunnah' && distance <= 90) {

                        var sec = Math.max(0, distance);

                        // tampilkan overlay sekali saja
                        if (!iqomahCountdownActive) {

                            showOverlay("SEBENTAR LAGI IQOMAH", "", "📵 Pastikan Gadget Off / 🔕 Silent");

                            iqomahCountdownActive = true;
                        }

                        // update hanya jika detik berubah (anti flicker)
                        if (sec !== iqomahLastSecond) {

                            iqomahLastSecond = sec;

                            /* $('.msg2').text(moment.utc(sec*1000).format("mm:ss"));*/
                            /* $('.msg2').text(sec.toString().padStart(2,'0'));*/
                            $('.msg2').text(sec);
                        }
                    }

                    // =========================
                    // COUNTDOWN DISPLAY
                    // FIX BUG countdown negative time
                    // =========================
                    if (distance > 0) {
                        $(".countdown-event").text(moment.utc(distance * 1000).format("HH:mm:ss"));
                    } else {
                        $(".countdown-event").text("00:00:00");
                    }

                    // =========================
                    // TRANSISI EVENT
                    // =========================
                    if (distance <= 0) {

                        stopTimer();

                        if (name == 'adzan') {

                            showOverlay("Laksanakan", "Shalat Sunnah", "Sebelum Iqomah");

                            iqomahCountdownActive = false;
                            iqomahLastSecond = -1;

                            if (shalatName == 'SUBUH') {
                                countdownShalat(
                                    moment().add(setting.shalatSunnahTimeSubuh).unix(),
                                    'shalat_sunnah',
                                    'MENJELANG IQOMAH ' + shalatName,
                                    shalatName
                                );
                            } else {
                                countdownShalat(
                                    moment().add(setting.shalatSunnahTime).unix(),
                                    'shalat_sunnah',
                                    'MENJELANG IQOMAH ' + shalatName,
                                    shalatName
                                );
                            }
                            return;

                        } else if (name == 'shalat_sunnah') {

                            beep();

                            showOverlay("IQOMAH", "Luruskan dan Rapatkan Shaf", "🔕 Silent / 📵 Matikan (Off) Gadget");

                            countdownShalat(
                                moment().add(setting.iqomahTime).unix(),
                                'iqomah',
                                'IQOMAH ' + shalatName,
                                shalatName
                            );
                            return;

                        } else if (inArray(name, ['SUBUH', 'ZHUHUR', 'ASHAR', 'MAGHRIB', 'ISYA'])) {

                            beep();

                            showOverlay("📢 ADZAN", "Telah Masuk Waktu", "Shalat " + name);

                            countdownShalat(
                                moment().add(setting.adzanTime).unix(),
                                'adzan',
                                'ADZAN ' + name,
                                name
                            );
                            return;

                        } else if (name == 'iqomah') {

                            // =========================================
                            // MODE : SHALAT BERLANGSUNG
                            // =========================================

                            // tampilkan overlay besar
                            showOverlay("🕋", "SHALAT " + shalatName, "SEDANG BERLANGSUNG");

                            // hentikan slideshow selama shalat
                            stopOwl();

                            // hentikan running text selama shalat
                            $('.running-text').marquee('pause');

                            // sembunyikan running text
                            $('.running-container').hide();


                            // ambil durasi shalat dari setting (default 10 menit)
                            var durasi = setting.shalatDuration[shalatName] || 600000;

                            // update text di header kanan
                            $('.desc').text('SEDANG SHALAT ' + shalatName);

                            // -----------------------------------------
                            // hitung waktu selesai shalat
                            // menggunakan timestamp agar stabil
                            // -----------------------------------------
                            finalTime = Math.floor((Date.now() + durasi) / 1000);

                            // -----------------------------------------
                            // countdown DURASI SHALAT
                            // -----------------------------------------
                            mycountdown = setInterval(function () {

                                var now = Math.floor(Date.now() / 1000);
                                var distance = finalTime - now;

                                if (distance > 0) {
                                    $(".countdown-event").text(moment.utc(distance * 1000).format("HH:mm:ss"));
                                } else {
                                    $(".countdown-event").text("00:00:00");
                                }


                            }, 1000);

                            // -----------------------------------------
                            // timer akhir shalat
                            // -----------------------------------------
                            shalatTimer = setTimeout(function () {

                                // hentikan countdown shalat
                                stopTimer();

                                // tutup overlay
                                hideOverlay();

                                // hidupkan kembali slideshow
                                safeResetOwl();

                                // hidupkan kembali running text
                                $('.running-text').marquee('resume');

                                // sembunyikan running text
                                $('.running-container').show();


                                // reset state sistem
                                systemPrayer = "";
                                systemState = "countdown";

                                // lanjut ke jadwal shalat berikutnya
                                setTimeout(function () {
                                    nextSchedule();
                                }, 300);

                            }, durasi);

                        } else if (name == 'IMSAK') {   // ← TAMBAHAN UNTUK IMSAK
                            systemState = "countdown"; // langsung kembali normal

                            nextSchedule();
                            return;

                        } else if (name == 'SYURUQ') {   // ← TAMBAHAN UNTUK SYURUQ
                            systemState = "countdown"; // langsung kembali normal

                            nextSchedule();
                            return;

                        } else {

                            nextSchedule();

                        }

                    }

                    // =========================
                    // UPDATE JAM & TANGGAL
                    // =========================
                    //updateClockDisplay();
                }, 1000);
            }

            function nextSchedule() {

                // ========================================
                // PROTEKSI RITUAL PHASE
                // ========================================
                console.log("nextSchedule called | state:", systemState);

                if (systemState !== "countdown" && systemState !== "iqomah") {

                    console.log(
                        "nextSchedule blocked (ritual phase)",
                        "| state:", systemState,
                        "| prayer:", systemPrayer,
                        "| time:", moment().format("HH:mm:ss")
                    );

                    return;
                }

                var found = false;
                systemState = "countdown";

                if (systemPrayer == "") {
                    hideOverlay();
                }

                var now = Math.floor(Date.now() / 1000);

                // ========================================
                // LOOP MASTER SCHEDULE (SUDAH DISORT)
                // ========================================
                for (var i = 0; i < masterSchedule.length; i++) {

                    if (now < masterSchedule[i].timestamp) {

                        countdownShalat(
                            masterSchedule[i].timestamp,
                            masterSchedule[i].name,
                            'MENJELANG ' + masterSchedule[i].name,
                            masterSchedule[i].name
                        );

                        found = true;
                        return false;
                    }
                }

                // ========================================
                // JIKA SUDAH LEWAT SEMUA → BESOK EVENT PERTAMA
                // ========================================
                if (!found) {

                    var first = masterSchedule[0];
                    var splt = first.timeStr.split(':');

                    var next = moment()
                        .add(1, 'day')
                        .hour(splt[0])
                        .minute(splt[1])
                        .second(0)
                        .unix();

                    countdownShalat(
                        next,
                        first.name,
                        'MENJELANG ' + first.name,
                        first.name
                    );
                }
            }
            // =========================================
            // NETWORK STATUS DETECTOR
            // =========================================

            function updateNetworkStatus() {

                if (!navigator.onLine) {

                    $('.net-status, .net-status-header')
                        .text("OFFLINE")
                        .removeClass('net-online')
                        .addClass('net-offline');

                    return;

                }

                // jika WIFI ada, cek benar internet hidup
                checkInternet();

            }

            // CHECK koneksi INTERNET real time, bukan sekedar adanya WIFI 
            function checkInternet() {

                var latencyStart = Date.now();
                var testUrls = [
                    "https://1.1.1.1/cdn-cgi/trace",          // paling kuat (IP langsung)
                    "https://cloudflare.com/cdn-cgi/trace",   // CDN global
                ];

                if (location.origin !== "null") {
                    testUrls.push(location.origin); // tambahkan origin sendiri untuk cek koneksi ke server lokal (jika ada)
                }

                var checked = 0;
                var done = false; // success flag untuk mencegah multiple callback

                testUrls.forEach(function (url) {

                    if (done) return;

                    $.ajax({
                        url: url,
                        method: 'GET',
                        cache: false,
                        timeout: 4500, // timeout 4.5 detik untuk respons, jika lebih dari ini dianggap gagal

                        success: function () {

                            if (done) return;
                            done = true;

                            internetFailCount = 0;
                            var latency = Date.now() - latencyStart;

                            if (latency < 200) {
                                statusText = "ONLINE";
                            } else if (latency < 1000) {
                                statusText = "SLOW";
                            } else {
                                statusText = "VERY SLOW";
                            }

                            $('.net-status, .net-status-header')
                                .text(statusText)
                                .removeClass('net-offline')
                                .addClass('net-online');
                        },

                        error: function () {

                            if (done) return;

                            checked++;

                            if (checked === testUrls.length) {

                                internetFailCount++;

                                console.log("Internet check failed | count:", internetFailCount);

                                if (internetFailCount < internetFailTolerance) {

                                    $('.net-status, .net-status-header')
                                        .text("CHECKING...")
                                        .removeClass('net-online net-offline');

                                } else {

                                    $('.net-status, .net-status-header')
                                        .text("OFFLINE")
                                        .removeClass('net-online')
                                        .addClass('net-offline');

                                }
                            }
                        }
                    });

                });
            }

            // Gunakan Overlay
            function showOverlay(msg1, msg2, msg3) {

                $('.msg1').text(msg1);
                $('.msg2').text(msg2);
                $('.msg3').text(msg3);

                $('.message-overlay').css('display', 'flex');
            }

            function hideOverlay() {
                $('.message-overlay').hide();
            }


            function startOwl() {
                if (!owlReady) return; // <-- PROTEKSI

                if (!owlRunning) {
                    $('.owl-carousel').trigger('play.owl.autoplay', [setting.slideInterval]);
                    owlRunning = true;
                    console.log("Owl started");
                }
            }

            function stopOwl() {
                if (!owlReady) return; // <-- PROTEKSI

                if (owlRunning) {
                    $('.owl-carousel').trigger('stop.owl.autoplay');
                    owlRunning = false;
                    console.log("Owl stopped");
                }
            }

            function safeResetOwl() {

                if (!owlReady) {
                    console.log("Owl not ready, skip reset");
                    return;
                }

                // batalkan reset sebelumnya (ANTI NUMPUK)
                if (owlResetTimer) {
                    clearTimeout(owlResetTimer);
                }

                if (owlRunning) {
                    stopOwl();
                }

                owlResetTimer = setTimeout(function () {
                    $('.owl-carousel').trigger('to.owl.carousel', [0, 0]);
                    startOwl();
                    owlResetTimer = null;
                }, 100);
            }

    </script>
