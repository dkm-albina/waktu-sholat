<script>

//app setting
var app = {
	version: '1.6.0', // FIX BUG + auto refresh daily + stability fix (09/03/2026) by Andryan Nugraha
	name: 'Bilal App',
	autoLocation: false //jika anda ingin menggunakan autolocation, setelah memilih opsi enable GPS pada browser, lalukan refresh pada browser. Fitur ini hanya berfungsi jika device terkoneksi dengan internet saja.
};

//general setting
var setting = {
	nama: 'MASJID AL - BINA',
	alamat: 'Casablanca East Residences',

	//settingan latitude longitude altitude timezone jika app.autoLocation=false atau jika browser tidak support HTML5 Geolocation
	latitude: -6.223723,
	longitude:106.897179,
	altitude:100,
	timezoneOffset:7,

	methodCalc:'Kemenag', //metode perhitungan adzan
	dst: 'auto',

	tune: {imsak: +3, fajr: +3, sunrise: +6, dhuhr: +3, asr: +3, sunset: +3, maghrib:+3, isha:+0, midnight:+3},

	runningTextFile: "www/public/Bilal/text/runningtext.txt",
	runningTextSpeed: 15000,

	slideInterval: 18000,
	slideImageCount: 21,

	adzanTime: 300000, // 5 menit lama tulisan adzan
	iqomahTime: 60000, //1 menit lama waktu tulisan iqomah
	shalatSunnahTime: 600000, //10 menit lama waktu tulisan sholat sunnah
	shalatSunnahTimeSubuh:900000,
	blankShalatTime: 600000, // 10 menit layar blank saat shalat

	aliasName: ['IMSAK', 'SUBUH', 'SYURUQ', 'ZHUHUR', 'ASHAR', 'MAGHRIB', 'ISYA']
}

// FIX BUG global variable
var mycountdown;
var finalTime;
var masterTime;
var masterName;
var lastPhase = null;
var systemBoot = true;
var startAppRunning = false;

// FIX FEATURE auto refresh daily tracking
var todayDate = moment().format("YYYY-MM-DD");

// ===============================
// WATCHDOG DISPLAY SYSTEM
// menjaga sistem tetap hidup 24 jam
// ===============================

var watchdogLastTick = Date.now();

setInterval(function(){

    var now = Date.now();
    var diff = now - watchdogLastTick;

    // jika lebih dari 2 menit tidak ada aktivitas
    if(diff > 120000){

        console.log("Watchdog restart triggered");

        try{
            startApp(); // restart sistem jadwal
        }catch(e){
            console.log("Watchdog error:",e);
        }

        watchdogLastTick = Date.now();

    }

},300000); // cek setiap 5 menit

// FIX PrayTimes bug: normalisasi waktu > 24
function normalizeTime(t){
    var p = t.split(':');
    var h = parseInt(p[0]);
    var m = parseInt(p[1]);

    if(h >= 24) h = h - 24;

    return h.toString().padStart(2,'0') + ':' + p[1];
}

// FIX BUG geolocation async
function startApp(){

    // =========================================
    // LOCK SYSTEM
    // mencegah startApp dipanggil bersamaan
    // =========================================

    if(startAppRunning) return;
    startAppRunning = true;

    try{

        stopTimer(); // pastikan timer lama berhenti

        var offsetIcon = setting.timezoneOffset>0?'+':(setting.timezoneOffset==0)?'':'-';
        var now = new Date();

        // watchdog heartbeat
        watchdogLastTick = Date.now();

        // =========================================
        // HITUNG JADWAL SHOLAT
        // =========================================

        prayTimes.setMethod(setting.methodCalc);
        prayTimes.tune(setting.tune);

        var times = prayTimes.getTimes(
            now,
            [setting.latitude, setting.longitude],
            setting.timezoneOffset,
            setting.dst
        );


// =========================================
// SAFETY CHECK
// jika PrayTimes gagal mengembalikan waktu
// =========================================
if(!times.fajr || !times.dhuhr || !times.maghrib){
    console.log("PrayTimes error, retrying...");
    setTimeout(startApp,2000);
    return;
}

		
times.imsak = normalizeTime(times.imsak);
times.fajr = normalizeTime(times.fajr);
times.sunrise = normalizeTime(times.sunrise);
times.dhuhr = normalizeTime(times.dhuhr);
times.asr = normalizeTime(times.asr);
times.maghrib = normalizeTime(times.maghrib);
times.isha = normalizeTime(times.isha);

        masterTime = [
            times.imsak,
            times.fajr,
            times.sunrise,
            times.dhuhr,
            times.asr,
            times.maghrib,
            times.isha
        ];

        masterName = setting.aliasName;

        // =========================================
        // UPDATE UI
        // =========================================

        $('.IMSAK').text(times.imsak);
        $('.SUBUH').text(times.fajr);
        $('.SYURUQ').text(times.sunrise);
        $('.ZHUHUR').text(times.dhuhr);
        $('.ASHAR').text(times.asr);
        $('.MAGHRIB').text(times.maghrib);
        $('.ISYA').text(times.isha);

        $('.tz-offset').text(offsetIcon+setting.timezoneOffset);
        $('.latitude').text(setting.latitude);
        $('.longitude').text(setting.longitude);
        $('.altitude').text(setting.altitude);

        $('.middle1').text(setting.nama);
        $('.middle2').text(setting.alamat);

        $('.version').text(app.version);
        $('.appname').text(app.name);

        // mulai sistem jadwal
        nextSchedule();

    }
    finally{

        // =========================================
        // UNLOCK SYSTEM
        // selalu dijalankan walaupun error terjadi
        // =========================================

        startAppRunning = false;

    }
}

// FIX BUG audio autoplay
function beep(){
	if($('#player')[0]){
		$('#player')[0].play().catch(()=>{});
	}
}

// FIX BUG inArray
function inArray(needle, haystack) {
    for(var i=0;i<haystack.length;i++){
        if(haystack[i]==needle) return true;
    }
    return false;
}

$(function(){

	moment.locale('id'); 

	//running text
	$.ajax({
	url: setting.runningTextFile + '?v=' + Date.now(),

	timeout: 5000,

	success: function(d){
		$('.running-text').text(d);
	},
	error:function(){
		$('.running-text').text("Selamat datang di " + setting.nama);
	},
	complete:function(){

    if($.fn.marquee){

        $('.running-text').marquee('destroy');

        $('.running-text').marquee({
            duration: setting.runningTextSpeed
        });

    }

}
});

	// FIX BUG geolocation async
	if(app.autoLocation && "geolocation" in navigator){

		navigator.geolocation.getCurrentPosition(function(position){

			setting.latitude = position.coords.latitude;
			setting.longitude = position.coords.longitude;

			// FIX BUG altitude undefined pada beberapa browser
			if(position.coords.altitude !== null && position.coords.altitude !== undefined){
				setting.altitude = position.coords.altitude;
			}

			// FIX BUG timezone
			setting.timezoneOffset = -new Date().getTimezoneOffset()/60;
			app.autoLocation = false; // ← tambahan kecil

			startApp();

		},
		function error(){
			startApp(); // fallback jika GPS gagal
		},
		{maximumAge:10000, timeout:3000, enableHighAccuracy:true});

	}else{

		startApp();

	}

	//slide wallpaper
	for(var a=1;a<=setting.slideImageCount;a++){ // FIX BUG global variable
		$('.slide-container').append('<div class="item" style="background-image: url(\'www/public/Bilal/img/slide/'+a+'.JPG?v='+app.version+'\')"></div>');
	}

	$('.owl-carousel').owlCarousel({
		loop:true,
		items:1,
		dots:false,
		lazyLoad:true,
		autoplay:true,
		autoplayHoverPause:false,
		touchDrag:false,
		mouseDrag:false,
		smartSpeed:2000,
		autoplayTimeout:setting.slideInterval,
		slideTransition:'ease-in-out'
	});

	// FIX FEATURE auto refresh jadwal setiap hari (OFFLINE SAFE)
	// tidak menggunakan reload agar tetap berjalan walaupun tanpa internet
	setInterval(function(){

	var currentDate = moment().format("YYYY-MM-DD");

	if(currentDate !== todayDate){

		todayDate = currentDate; // update hari
		startApp(); // hitung ulang jadwal shalat tanpa reload halaman

	}

},60000);

	// FIX STABILITY TV BOX MODE
	// tidak reload halaman karena bisa gagal jika internet mati
	// hanya refresh jadwal dan countdown

	setInterval(function(){

	console.log("Bilal App stability refresh");

	startApp(); // refresh jadwal tanpa reload halaman

},21600000); // 6 jam

});

//stop timer
function stopTimer(){
	if(mycountdown){
		clearInterval(mycountdown);
		mycountdown = null; // tambahan kecil
	}
}

function countdownShalat(time, name, desc, shalatName =''){

	stopTimer(); // FIX memory leak
	
	$('.myprayer').removeClass('highlight');

	var highlightName = shalatName || name;

	// jika class tidak ada, gunakan jadwal berikutnya (name)
	if(!$('.'+highlightName).length){
    highlightName = name;
	}

	$('.'+highlightName).closest('.myprayer').addClass('highlight');

	$('.desc').text(desc);
	
	finalTime = time;
	
	// =========================================
	// TIMER PROTECTION
	// memastikan tidak ada timer ganda
	// =========================================

	if(mycountdown){
    	clearInterval(mycountdown);
		mycountdown = null; // tambahan kecil
	}

	setTimeout(function(){

    mycountdown = setInterval(function() {

    watchdogLastTick = Date.now(); // FIX BUG watchdog tick

   		var nowMoment = moment();
		var now = nowMoment.unix();

		var distance = finalTime - now;
		
		// FIX BUG countdown negative time
		if(distance <= 0){

			clearInterval(mycountdown);
			mycountdown = null;

		if(name === 'iqomah'){

		// tampilkan pesan iqamah
		$('.layer')
		.css('display','flex')
		.hide()
		.html('IQAMAH<br><div style="font-size:60px;margin-top:30px">Waktunya Shalat '+shalatName+'</div>')
		.fadeIn(300);

		// setelah 16 detik layar jadi blank
		setTimeout(function(){

			$('.layer').html('');

		},16000);

		// setelah waktu shalat selesai kembali normal
		setTimeout(function(){

			$('.layer').fadeOut(500);

		}, setting.blankShalatTime + 16000);

	}

	nextSchedule();
	return;

}
// FIX: jika target waktu tidak valid, hitung ulang jadwal
if(distance > 43200 || distance < -10){
    console.log("Invalid countdown detected, recalculating schedule");
    nextSchedule();
    return;
}
var hours = Math.floor(distance / 3600);
var minutes = Math.floor((distance % 3600) / 60);
var seconds = distance % 60;

$('.countdown-event').text(
    hours.toString().padStart(2,'0') + ':' +
    minutes.toString().padStart(2,'0') + ':' +
    seconds.toString().padStart(2,'0')
);

		$('.masehi').html(nowMoment.format('HH:mm:ss'));
		$('.hijriah').text(nowMoment.format('ddd, DD/MM/YYYY')+' - '+nowMoment.format('iD iMMMM iYYYY'));

	    },1000);

},1000 - (Date.now() % 1000));

}

// =========================================
// FIX TOTAL : LOGIKA PENENTUAN WAKTU SHALAT
// menghindari bug countdown 24:00:00
// =========================================
function getPrayerPhase(){

    var now = moment();

    // ===============================
    // CARI WAKTU SHALAT BERIKUTNYA
    // ===============================
    for(let i=0;i<masterTime.length;i++){

        var splt = masterTime[i].split(':');

        // waktu shalat hari ini
        var prayerMoment = moment()
            .hour(parseInt(splt[0]))
            .minute(parseInt(splt[1]))
            .second(0)
            .millisecond(0);

        // jika waktu sekarang masih sebelum waktu shalat
        if(now.isBefore(prayerMoment)){

            return {
                target: prayerMoment.unix(),
                name: masterName[i],
                desc: 'MENJELANG ' + masterName[i],
                highlight: masterName[i]
            };

        }

    }

    // =========================================
    // JIKA SEMUA WAKTU HARI INI SUDAH LEWAT
    // MAKA MENUJU IMSAK BESOK
    // =========================================

    var splt = masterTime[0].split(':');

    // FIX BUG 24 JAM
    // gunakan startOf('day') agar timestamp selalu benar
    var tomorrow = moment()
        .add(1,'day')
        .startOf('day')
        .hour(parseInt(splt[0]))
        .minute(parseInt(splt[1]))
        .second(0)
        .millisecond(0);

    return {
        target: tomorrow.unix(),
        name: masterName[0],
        desc: 'MENJELANG ' + masterName[0],
        highlight: masterName[0]
    };

}

function nextSchedule(){

    var phase = getPrayerPhase();

    if(!phase){
        console.log("Schedule error, restarting...");
        startApp();
        return;
    }
// =========================================
// SOUND NOTIFICATION SYSTEM
// BEEP untuk semua event waktu penting
// =========================================
if(!systemBoot && lastPhase !== phase.name){

    // BEEP untuk semua waktu utama
    if(
        phase.name === 'IMSAK' ||
        phase.name === 'SUBUH' ||
        phase.name === 'SYURUQ' ||
        phase.name === 'ZHUHUR' ||
        phase.name === 'ASHAR' ||
        phase.name === 'MAGHRIB' ||
        phase.name === 'ISYA'
    ){
        beep();
    }

}
	// FIX: IMSAK tidak memiliki fase adzan
		if(phase.name === 'IMSAK'){
    	phase.desc = 'MENJELANG IMSAK';
}

    
    systemBoot = false;
    lastPhase = phase.name;

    countdownShalat(
        phase.target,
        phase.name,
        phase.desc,
        phase.highlight
    );

}	

// ===============================
// UI SELF HEALING SYSTEM
// ===============================

var lastSlideIndex = 0;

setInterval(function(){

    try{

        var owl = $('.owl-carousel');

		if(!owl.length) return;

		var carousel = owl.data('owl.carousel');

        // ===============================
        // CAROUSEL SELF HEAL
        // ===============================

        if(carousel){

            var current = carousel.relative(carousel.current());

            if(current === lastSlideIndex){

                console.log("Carousel stuck, reinitializing");

                owl.trigger('destroy.owl.carousel');

owl.removeClass("owl-loaded");
owl.find(".owl-stage-outer").children().unwrap();
owl.find(".owl-stage").children().unwrap();

                owl.owlCarousel({
                    loop:true,
                    items:1,
                    dots:false,
                    lazyLoad:true,
                    autoplay:true,
                    autoplayHoverPause:false,
                    touchDrag:false,
                    mouseDrag:false,
                    smartSpeed:2000,
                    autoplayTimeout:setting.slideInterval
                });

            }

            lastSlideIndex = current;

        }

        // ===============================
        // RUNNING TEXT SELF HEAL
        // ===============================

        if($('.running-text').text().trim() === ""){

            console.log("Running text empty, reload");

            $.ajax({
                url: setting.runningTextFile + '?v=' + Date.now(),
                success:function(d){

					if($.fn.marquee){
   					$('.running-text').marquee('destroy');
					}
                    
					if($.fn.marquee){
   					$('.running-text')
   					.text(d)
   					.marquee({
       					duration: setting.runningTextSpeed
   					});
					}
                    
                }
            });

        }

    }catch(e){

        console.log("UI Watchdog error", e);

    }

},600000); // cek setiap 10 menit


// ===============================
// MEMORY CLEAN CYCLE
// reload ringan setiap hari
// ===============================

setInterval(function(){

    var now = moment().format("HH:mm");

    if(now >= "21:00" && now < "21:02"){

        console.log("Daily memory cleanup reload");

        stopTimer();
		startApp();

    }

},60000);


// =========================================
// TIMER DRIFT DETECTOR
// mendeteksi jika javascript loop macet
// =========================================

var lastLoop = Date.now();

setInterval(function(){

    var now = Date.now();

    // jika javascript berhenti lebih dari 30 detik
    if(now - lastLoop > 30000){

        console.log("Timer drift detected → restarting schedule");

        startApp();

    }

    lastLoop = now;

},5000);


// ===============================
// SOFT MEMORY RESET SYSTEM
// membersihkan memory JS tanpa reload halaman
// ===============================

setInterval(function(){

    console.log("Soft memory reset triggered");

    try{

        // hentikan timer lama
        stopTimer();

        // reset beberapa variabel penting
        lastPhase = null;
        systemBoot = true;

        // jalankan ulang sistem jadwal
        startApp();

    }catch(e){

        console.log("Soft reset error:", e);

    }

},7200000); // setiap 2 jam


// ===============================
// GLOBAL ERROR RECOVERY
// ===============================

window.onerror = function(message, source, lineno, colno, error){

    console.log("BilalApp global error:", message);

    setTimeout(function(){

        console.log("BilalApp restarting due to error");

        location.reload();

    },3000);

};
