<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jadwal Shalat</title>

<link rel="stylesheet" href="www/public/Bilal/css/normalize.min.css">
<link rel="stylesheet" href="www/public/Bilal/js/owlcarousel/assets/owl.carousel.min.css">
<link rel="stylesheet" href="www/public/Bilal/js/owlcarousel/assets/owl.theme.default.min.css">

<style>

*{
padding:0;
margin:0;
}

.row{
box-sizing:border-box;
}

.col{
float:left;
box-sizing:border-box;
}

.col4{
width:27%;
color:#ff4500;
font-size:14px;
}

.first .mybox{
background-color:#005577;
text-align:center;
border-radius:4px;
font-weight:bold;
}

.col2{
width:46%;
}

.col7{
float:left;
width:12.28%;
margin-left:1%;
margin-right:1%;
}

.p-0{padding:0;}

.mycontainer{
width:100%;
height:100vh;
}

.first{
background-color:#006699;
padding:5px 0;
height:100px;
}

.first .middle1{
color:#fff;
font-size:42px;
font-weight:bold;
}

.first .middle2{
color:#F5EC6D;
font-size:21px;
font-weight:bold;
}

.first .middle3{
color:#fff;
font-size:14px;
font-weight:bold;
}

.second{
padding:5px 10px 0 10px;
margin-bottom:20px;
height:64px;
}

.third{
padding:0 16px;
}

.super-block{
background-image: linear-gradient(#2193b0, #6dd5ed, #f8f1e5);
}

.prayer-title{
font-size:20px;
text-align:center;
background-color:#004d47;
margin-bottom:1px;
border-radius:4px;
font-weight:bold;
}

.prayer-time{
font-size:44px;
text-align:center;
background-color:#2c7873;
border-radius:4px;
font-weight:bold;
}

.clear{clear:both;}

.text-center{text-align:center;}

.masehi{
font-size:52px;
font-weight:bold;
color:#66ffff;
}

.hijriah{
padding:8px 0;
font-weight:bold;
color:#dcdcdc;
font-size:12px;
}

.countdown-event{
font-size:60px;
font-weight:bold;
color:#ccff00;
}

.highlight{
color:#ff4500 !important;
font-weight:bold;
}

.running-container{
position:absolute;
bottom:16px;
left:2%;
width:98%;
z-index:999;
}

.running-text{
padding:4px;
overflow:hidden;
background:#2c0f0082;
color:#F5EC6D;
font-size:27px;
}

.wallpaper .item{
width:100%;
background-size:100% 100%;
background-position:center;
background-repeat:no-repeat;
background-color:#124653;
height:calc(100vh - 196px);
border:2px solid #124653;
}

</style>
</head>

<body>

<div class="mycontainer">

<div class="row first">

<div class="col col4">
<div class="masehi mybox"></div>
<div class="hijriah mybox"></div>
</div>

<div class="col col2 text-center">
<div class="middle1"></div>
<div class="middle2"></div>
<div class="middle3">
TZ: <span class="tz-offset"></span> |
LAT: <span class="latitude"></span> |
LNG: <span class="longitude"></span>
</div>
</div>

<div class="col col4">
<div class="countdown-event mybox"></div>
<div class="mybox"><span class="desc"></span></div>
</div>

<div class="clear"></div>
</div>

<div class="row super-block">

<div class="row second">
<div class="col7 myprayer">
<div class="prayer-title">SUBUH</div>
<div class="prayer-time SUBUH"></div>
</div>

<div class="col7 myprayer">
<div class="prayer-title">ZHUHUR</div>
<div class="prayer-time ZHUHUR"></div>
</div>

<div class="col7 myprayer">
<div class="prayer-title">ASHAR</div>
<div class="prayer-time ASHAR"></div>
</div>

<div class="col7 myprayer">
<div class="prayer-title">MAGHRIB</div>
<div class="prayer-time MAGHRIB"></div>
</div>

<div class="col7 myprayer">
<div class="prayer-title">ISYA</div>
<div class="prayer-time ISYA"></div>
</div>

<div class="clear"></div>
</div>

<div class="row third">

<div class="wallpaper">
<div class="slide-container owl-carousel"></div>

<div class="running-container">
<div class="running-text"></div>
</div>
</div>

</div>

</div>
</div>

<audio id="player">
<source src="www/public/Bilal/audio/beep.mp3" type="audio/mp3">
</audio>

<script src="www/public/Bilal/js/jquery-3.3.1.min.js"></script>
<script src="www/public/Bilal/js/moment-with-locales.min.js"></script>
<script src="www/public/Bilal/js/moment-hijri.js"></script>
<script src="www/public/Bilal/js/PrayTimes.js"></script>
<script src="www/public/Bilal/js/jquery.marquee.min.js"></script>
<script src="www/public/Bilal/js/owlcarousel/owl.carousel.min.js"></script>

<script>

var countdownTimer=null;

var setting={
nama:'MASJID AL BINA',
alamat:'Casablanca East Residences',
latitude:-6.223723,
longitude:106.897179,
timezoneOffset:7
}

function beep(){
document.getElementById("player").play();
}

function formatTime(sec){

var h=Math.floor(sec/3600);
var m=Math.floor((sec%3600)/60);
var s=Math.floor(sec%60);

return (
("0"+h).slice(-2)+":"+
("0"+m).slice(-2)+":"+
("0"+s).slice(-2)
)

}

$(function(){

moment.locale('id');

$('.middle1').text(setting.nama)
$('.middle2').text(setting.alamat)

prayTimes.setMethod('Kemenag')

var now=new Date()

var times=prayTimes.getTimes(
now,
[setting.latitude,setting.longitude],
setting.timezoneOffset
)

$('.SUBUH').text(times.fajr)
$('.ZHUHUR').text(times.dhuhr)
$('.ASHAR').text(times.asr)
$('.MAGHRIB').text(times.maghrib)
$('.ISYA').text(times.isha)

var schedule=[
{name:"SUBUH",time:times.fajr},
{name:"ZHUHUR",time:times.dhuhr},
{name:"ASHAR",time:times.asr},
{name:"MAGHRIB",time:times.maghrib},
{name:"ISYA",time:times.isha}
]

function nextSchedule(){

if(countdownTimer) clearInterval(countdownTimer)

var now=moment()

for(var i=0;i<schedule.length;i++){

var t=moment(
moment().format("YYYY-MM-DD")+" "+schedule[i].time
)

if(now.isBefore(t)){

startCountdown(t,schedule[i].name)
return

}

}

}

function startCountdown(target,name){

$('.desc').text("MENJELANG "+name)

countdownTimer=setInterval(function(){

var now=moment()

var diff=target.diff(now,'seconds')

if(diff<=0){

beep()

clearInterval(countdownTimer)

setTimeout(nextSchedule,3000)

}

$('.countdown-event').text(formatTime(diff))

$('.masehi').text(moment().format("HH:mm:ss"))

$('.hijriah').text(
moment().format("dddd, DD MMMM YYYY")+" - "+
moment().format("iD iMMMM iYYYY")
)

},1000)

}

nextSchedule()

$.ajax({
url:"www/public/Bilal/text/runningtext.txt",
success:function(data){

$('.running-text').text(data)

$('.running-text').marquee({
duration:15000
})

}
})

for(var i=1;i<=20;i++){

$('.slide-container').append(
'<div class="item" style="background-image:url(www/public/Bilal/img/slide/'+i+'.JPG)"></div>'
)

}

$('.owl-carousel').owlCarousel({
items:1,
loop:true,
autoplay:true,
autoplayTimeout:15000
})

})

</script>

</body>
</html>
